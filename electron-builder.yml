appId: com.notes-widget.app
productName: Notes Widget
directories:
  buildResources: build
publish:
  provider: github
  owner: Morgun61
  repo: notes-widget
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
asarUnpack:
  - '**/node_modules/koffi/**'
extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png
win:
  target: nsis
  executableName: NotesWidget
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # zip alongside dmg: Squirrel.Mac (electron-updater's mac auto-update
  # engine) fetches a zipped .app bundle to install in place, not the
  # dmg itself - dmg stays here only for the initial manual download/install.
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  # No Apple Developer ID certificate configured, so this stays
  # unsigned/un-notarized - Gatekeeper will warn on first launch
  # (right-click > Open, or System Settings > Privacy & Security >
  # "Open Anyway"). Must be built on an actual Mac; electron-builder
  # cannot produce a working signed/notarized mac build from Windows.
  # Auto-update also silently won't work while unsigned - Squirrel.Mac
  # requires a signed app to apply updates.
  identity: null
